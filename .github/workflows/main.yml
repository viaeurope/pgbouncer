name: ci

on:
  push:

jobs:
  docker:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: depot/build-push-action@v1
        with:
          build-args: |
            PGBOUNCER_CHECKSUM=sha256:6e566ae92fe3ef7f6a1b9e26d6049f7d7ca39c40e29e7b38f6d5500ae15d8465
            PGBOUNCER_TAG=1_25_1
            PGBOUNCER_VERSION=1.25.1
          context: .
          platforms: linux/amd64,linux/arm64
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          push: true
          tags: ghcr.io/viaeurope/pgbouncer:1.25.1
